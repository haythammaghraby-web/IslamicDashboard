<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>الظواهر الكونية</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0f1a;--surface:#111827;--surface2:#1a2235;--border:rgba(180,150,80,0.2);--gold:#c9a227;--gold-light:#f0d060;--gold-dim:rgba(201,162,39,0.15);--teal:#4ecdc4;--text:#e8dcc8;--text-dim:#8a8070;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;padding:16px;padding-bottom:80px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:12px;}
.sec-title{font-family:'Amiri',serif;font-size:20px;color:var(--gold);text-align:center;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-title::before,.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab{padding:6px 12px;border-radius:10px;font-size:12px;cursor:pointer;color:var(--text-dim);border:1px solid transparent;background:var(--surface2);font-family:'Tajawal',sans-serif;transition:all 0.2s;white-space:nowrap;}
.tab.active{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
/* Event cards */
.ev-list{display:flex;flex-direction:column;gap:10px;}
.ev{background:var(--surface2);border-radius:14px;padding:14px;border:1px solid transparent;position:relative;overflow:hidden;}
.ev::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 14px 14px 0;}
.ev.lunar::before{background:linear-gradient(#4ecdc4,transparent);}
.ev.solar::before{background:linear-gradient(#ff9944,transparent);}
.ev.meteor::before{background:linear-gradient(#a0c0ff,transparent);}
.ev.planet::before{background:linear-gradient(#c060ff,transparent);}
.ev.special::before{background:linear-gradient(var(--gold),transparent);}
.ev-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ev-icon{font-size:24px;flex-shrink:0;}
.ev-title{font-family:'Amiri',serif;font-size:16px;flex:1;}
.ev-badge{font-size:9px;padding:3px 8px;border-radius:6px;font-weight:700;white-space:nowrap;}
.b-soon{background:rgba(201,162,39,0.2);border:1px solid var(--gold);color:var(--gold);}
.b-future{background:rgba(100,120,160,0.15);border:1px solid rgba(100,120,160,0.3);color:rgba(180,190,210,0.8);}
.ev-dates{display:flex;gap:10px;margin-bottom:5px;flex-wrap:wrap;}
.ev-dg{font-size:12px;color:var(--gold-light);}
.ev-dh{font-size:11px;color:var(--text-dim);}
.ev-desc{font-size:12px;color:var(--text-dim);line-height:1.55;}
.ev-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.ev-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);color:var(--text-dim);border:1px solid rgba(255,255,255,0.07);}
/* Moon Special Banner */
.moon-banner{background:linear-gradient(135deg,rgba(201,162,39,0.1),rgba(78,205,196,0.07));border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.mb-icon{font-size:40px;}
.mb-name{font-family:'Amiri',serif;font-size:18px;color:var(--gold);}
.mb-sub{font-size:11px;color:var(--text-dim);margin-top:3px;}
</style>
</head>
<body>

<div id="moonBanner"></div>

<div class="card">
  <div class="sec-title">✨ الظواهر الكونية القادمة</div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">🌌 الكل</button>
    <button class="tab" data-filter="lunar">🌙 قمرية</button>
    <button class="tab" data-filter="solar">☀️ شمسية</button>
    <button class="tab" data-filter="meteor">☄️ شهب</button>
    <button class="tab" data-filter="planet">🪐 كواكب</button>
  </div>
  <div class="ev-list" id="evList">
    <div style="color:var(--text-dim);text-align:center;padding:20px;animation:pulse 2s infinite;">جارٍ الحساب...</div>
  </div>
</div>

<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}</style>

<script>
const hijriMonths=['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
const gregMonths=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
function toHijri(d){const JD=Math.floor((d.getTime()/86400000)+2440587.5);let l=JD-1948440+10632,n=Math.floor((l-1)/10631);l=l-10631*n+354;let j=Math.floor((10985-l)/5316)*Math.floor((50*l)/17719)+Math.floor(l/5670)*Math.floor((43*l)/15238);l=l-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;return{day:l-Math.floor(709*Math.floor((24*l)/709)/24),month:Math.floor((24*l)/709),year:30*n+j-30};}
function fmtG(d){return`${d.getDate()} ${gregMonths[d.getMonth()]} ${d.getFullYear()}`;}
function fmtH(d){const h=toHijri(d);return`${h.day} ${hijriMonths[h.month-1]} ${h.year} هـ`;}
function daysBetween(a,b){return Math.round((b-a)/(864e5));}

function jdFromDate(y,m,d){if(m<=2){y--;m+=12;}const A=Math.floor(y/100);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+2-A+Math.floor(A/4)-1524.5;}
function dateFromJD(jd){const z=Math.floor(jd+0.5);let a=z<2299161?z:(()=>{const aa=Math.floor((z-1867216.25)/36524.25);return z+1+aa-Math.floor(aa/4);})();const b=a+1524,c=Math.floor((b-122.1)/365.25),d=Math.floor(365.25*c),e=Math.floor((b-d)/30.6001);const day=b-d-Math.floor(30.6001*e),month=e<14?e-1:e-13,year=month>2?c-4716:c-4715;return new Date(year,month-1,Math.floor(day));}

function getFullMoons(from,count){
  const k0=(from.getFullYear()+(from.getMonth()+1)/12-2000)*12.3685;
  let k=Math.ceil(k0-0.5)+0.5;const moons=[];
  const jd0=jdFromDate(from.getFullYear(),from.getMonth()+1,from.getDate());
  while(moons.length<count){
    const T=k/1236.85,T2=T*T,T3=T2*T,T4=T3*T;
    const JDE=2451550.09766+29.530588861*k+0.00015437*T2-0.000000150*T3+0.00000000073*T4;
    if(JDE>=jd0)moons.push(dateFromJD(JDE));k++;
  }return moons;
}
function moonDist(d){const T=(jdFromDate(d.getFullYear(),d.getMonth()+1,d.getDate())-2451545)/36525;const Mp=(134.96298+477198.867398*T)*Math.PI/180;return Math.round(385001-20905*Math.cos(Mp)-3699*Math.cos(2*(297.85036*Math.PI/180)-Mp));}
function getMoonPhase(){const now=new Date(),kNew=new Date(2024,0,11);const diff=(now-kNew)/864e5,cycle=29.53059;const phase=((diff%cycle)+cycle)%cycle,pct=phase/cycle;return{pct,day:Math.round(phase)};}

function buildEvents(from){
  const events=[];
  // Full moons with special types
  const fms=getFullMoons(from,14);
  const byMonth={};
  fms.forEach(d=>{const k=`${d.getFullYear()}-${d.getMonth()}`;(byMonth[k]=byMonth[k]||[]).push(d);});
  fms.forEach(d=>{
    const dist=moonDist(d);
    const isSuper=dist<362000,isMicro=dist>405000;
    const k=`${d.getFullYear()}-${d.getMonth()}`;
    const isBlue=byMonth[k].length>1&&byMonth[k].indexOf(d)===1;
    let name='',icon='🌕',desc='',tags=[],type='lunar';
    if(isSuper&&isBlue){name='قمر أزرق عملاق 🌟';desc=`بدر في أقرب نقطة (${dist.toLocaleString()} كم) وثاني بدر في نفس الشهر. نادر جداً!`;tags=['نادر جداً','أزرق','عملاق'];}
    else if(isSuper){name='قمر عملاق';desc=`المسافة ${dist.toLocaleString()} كم — أكبر بـ14% وأكثر إضاءة بـ30%.`;tags=['عملاق','perigee'];}
    else if(isMicro){name='قمر دقيق';icon='🌑';desc=`المسافة ${dist.toLocaleString()} كم — يبدو أصغر قليلاً.`;tags=['دقيق','apogee'];}
    else if(isBlue){name='القمر الأزرق';desc='ثاني بدر في الشهر الميلادي. يحدث مرة كل 2-3 سنوات.';tags=['أزرق','نادر'];}
    else return;
    events.push({date:d,name,icon,desc,tags,type,special:true});
  });

  // Meteors
  const y=from.getFullYear();
  [
    {name:'برشاويات (Perseids)',date:new Date(`${y}-08-12`),icon:'☄️',desc:'أشهر أمطار الشهب — 100 شهاب/ساعة. مخلفات مذنب Swift-Tuttle.',tags:['سنوي','ممتاز'],type:'meteor'},
    {name:'جوزائيات (Geminids)',date:new Date(`${y}-12-14`),icon:'☄️',desc:'الأغزر — 150 شهاب/ساعة. مخلفات كويكب Phaethon. ملونة ومبهرة.',tags:['سنوي','الأفضل'],type:'meteor'},
    {name:'أسديات (Leonids)',date:new Date(`${y}-11-17`),icon:'☄️',desc:'15-20 شهاب/ساعة. مخلفات مذنب Tempel-Tuttle.',tags:['سنوي'],type:'meteor'},
    {name:'دلويات (Eta Aquarids)',date:new Date(`${y}-05-06`),icon:'☄️',desc:'50 شهاب/ساعة. مخلفات المذنب هالي.',tags:['سنوي','هالي'],type:'meteor'},
    {name:'جديات (Quadrantids)',date:new Date(`${y}-01-04`),icon:'☄️',desc:'120 شهاب/ساعة. نشطة لساعات قليلة فقط.',tags:['سنوي','قصير'],type:'meteor'},
    {name:'ثوريات (Taurids)',date:new Date(`${y}-11-05`),icon:'☄️',desc:'شهب بطيئة لامعة. مخلفات مذنب Encke. كرات نارية.',tags:['سنوي','كرات نارية'],type:'meteor'},
    {name:'برشاويات (Perseids)',date:new Date(`${y+1}-08-12`),icon:'☄️',desc:'أشهر أمطار الشهب للعام القادم.',tags:['سنوي'],type:'meteor'},
  ].forEach(e=>{if(e.date>=from)events.push(e);});

  // Planetary events
  [
    {date:new Date('2025-03-01'),name:'اقتران الزهرة والمشتري',icon:'🪐',desc:'الزهرة والمشتري يتقاربان — فاصل 0.5° فقط. مشهد نادر.',tags:['اقتران','نادر'],type:'planet'},
    {date:new Date('2025-04-12'),name:'الزهرة في أوج لمعانها',icon:'✨',desc:'الزهرة تبلغ أقصى لمعان (-4.5). مرئية نهاراً.',tags:['الزهرة','لمعان'],type:'planet'},
    {date:new Date('2025-07-21'),name:'مقابلة المشتري',icon:'🪐',desc:'المشتري أقرب للأرض — أقماره مرئية بتليسكوب.',tags:['مقابلة','المشتري'],type:'planet'},
    {date:new Date('2025-09-21'),name:'مقابلة زحل',icon:'🪐',desc:'حلقات زحل مرئية بوضوح.',tags:['مقابلة','زحل'],type:'planet'},
    {date:new Date('2026-01-27'),name:'عبور عطارد أمام الشمس',icon:'🌑',desc:'ظاهرة نادرة — عطارد يمر أمام قرص الشمس. 13 مرة كل قرن.',tags:['عبور','نادر'],type:'solar'},
    {date:new Date('2026-03-20'),name:'الاعتدال الربيعي',icon:'🌸',desc:'تساوي الليل والنهار.',tags:['اعتدال'],type:'solar'},
    {date:new Date('2026-06-21'),name:'الانقلاب الصيفي',icon:'☀️',desc:'أطول يوم في السنة.',tags:['انقلاب','صيف'],type:'solar'},
    {date:new Date('2026-08-02'),name:'كسوف الشمس الكلي',icon:'🌑',desc:'مرئي من أفريقيا وجنوب أوروبا وغرب آسيا.',tags:['كسوف','كلي','نادر'],type:'solar'},
    {date:new Date('2026-12-21'),name:'الانقلاب الشتوي',icon:'❄️',desc:'أقصر يوم في السنة.',tags:['انقلاب','شتاء'],type:'solar'},
    {date:new Date('2027-08-02'),name:'كسوف الشمس الكلي — 2027',icon:'🌑',desc:'كسوف نادر مرئي من السعودية ومصر. مدته 6 دقائق!',tags:['كسوف','كلي','تاريخي'],type:'solar'},
  ].forEach(e=>{if(e.date>=from)events.push(e);});

  return events.sort((a,b)=>a.date-b.date).slice(0,25);
}

// Moon current status banner
function renderBanner(){
  const{pct,day}=getMoonPhase();
  const dist=moonDist(new Date());
  const isSuper=dist<362000,isMicro=dist>405000;
  const isNearFull=pct>0.45&&pct<0.55;
  let html='';
  if(isNearFull&&isSuper){html=`<div class="moon-banner"><div class="mb-icon">🌕</div><div><div class="mb-name">قمر عملاق الآن!</div><div class="mb-sub">المسافة: ${dist.toLocaleString()} كم • اليوم ${day}</div></div></div>`;}
  else if(isNearFull&&isMicro){html=`<div class="moon-banner" style="opacity:0.7"><div class="mb-icon">🌕</div><div><div class="mb-name">قمر دقيق الآن</div><div class="mb-sub">المسافة: ${dist.toLocaleString()} كم</div></div></div>`;}
  document.getElementById('moonBanner').innerHTML=html;
}

let allEvents=[];
let currentFilter='all';

function renderList(filter){
  currentFilter=filter;
  const now=new Date();
  const filtered=filter==='all'?allEvents:allEvents.filter(e=>e.type===filter);
  if(!filtered.length){document.getElementById('evList').innerHTML='<div style="color:var(--text-dim);text-align:center;padding:20px;">لا توجد ظواهر في هذه الفئة</div>';return;}
  let html='';
  filtered.forEach(ev=>{
    const days=daysBetween(now,ev.date);
    const badgeCls=days<=30?'b-soon':'b-future';
    const badgeTxt=days===0?'اليوم!':days<0?'مضى':`${days} يوم`;
    const tags=(ev.tags||[]).map(t=>`<span class="ev-tag">${t}</span>`).join('');
    html+=`<div class="ev ${ev.type||'special'}${ev.special?' special':''}">
      <div class="ev-head">
        <div class="ev-icon">${ev.icon||'🌟'}</div>
        <div class="ev-title">${ev.name}</div>
        <div class="ev-badge ${badgeCls}">${badgeTxt}</div>
      </div>
      <div class="ev-dates">
        <span class="ev-dg">📅 ${fmtG(ev.date)}</span>
        <span class="ev-dh">${fmtH(ev.date)}</span>
      </div>
      <div class="ev-desc">${ev.desc}</div>
      ${tags?`<div class="ev-tags">${tags}</div>`:''}
    </div>`;
  });
  document.getElementById('evList').innerHTML=html;
}

// Tab clicks
document.getElementById('tabs').addEventListener('click',e=>{
  const tab=e.target.closest('.tab');if(!tab)return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderList(tab.dataset.filter);
});

// Init
const now=new Date();
allEvents=buildEvents(now);
renderBanner();
renderList('all');
</script>
</body>
</html>
